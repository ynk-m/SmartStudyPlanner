spring:
  application:
    name: smartstudy

  datasource:
    url: jdbc:postgresql://localhost:5432/smartstudy
    username: smartstudy
    password: smartstudy
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

# Google Calendar sync interval (ms) - 15 minutes
app:
  calendar:
    sync-interval-ms: 900000
    lookahead-days: 60
