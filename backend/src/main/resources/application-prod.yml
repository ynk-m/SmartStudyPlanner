spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME:smartstudy}
    password: ${DATABASE_PASSWORD:smartstudy}

  jpa:
    hibernate:
      ddl-auto: validate

server:
  port: ${PORT:8080}

# Allow frontend origin (GitHub Pages)
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
