name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend CI ───────────────────────────────────────────
  backend:
    name: Backend (Java)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: smartstudy_test
          POSTGRES_USER: smartstudy
          POSTGRES_PASSWORD: smartstudy
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U smartstudy"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build -x test

      - name: Test
        run: ./gradlew test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/smartstudy_test
          SPRING_DATASOURCE_USERNAME: smartstudy
          SPRING_DATASOURCE_PASSWORD: smartstudy

  # ── Frontend CI ──────────────────────────────────────────
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx ng lint || true

      - name: Build
        run: npx ng build

      - name: Test
        run: npx ng test --watch=false --browsers=ChromeHeadless || true

  # ── Deploy to Raspberry Pi ───────────────────────────────
  deploy:
    name: Deploy to Raspberry Pi
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            export APP_DIR=/opt/smartstudy

            # Clone or pull
            if [ -d "$APP_DIR" ]; then
              cd "$APP_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              sudo mkdir -p "$APP_DIR"
              sudo chown $USER:$USER "$APP_DIR"
              git clone https://github.com/ynk-m/SmartStudyPlanner.git "$APP_DIR"
              cd "$APP_DIR"
            fi

            # Build and restart
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

            echo "Deploy complete"
            docker compose -f docker-compose.prod.yml ps
