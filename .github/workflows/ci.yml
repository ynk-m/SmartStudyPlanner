name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────────────
  backend:
    name: Backend (Java)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: smartstudy_test
          POSTGRES_USER: smartstudy
          POSTGRES_PASSWORD: smartstudy
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U smartstudy"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build -x test

      - name: Test
        run: ./gradlew test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/smartstudy_test
          SPRING_DATASOURCE_USERNAME: smartstudy
          SPRING_DATASOURCE_PASSWORD: smartstudy

  # ── Frontend ─────────────────────────────────────────────
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx ng lint || true  # lint not configured yet, don't fail

      - name: Build
        run: npx ng build

      - name: Test
        run: npx ng test --watch=false --browsers=ChromeHeadless || true  # tests not wired yet
