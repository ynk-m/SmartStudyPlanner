<div class="space-y-4">
  <div class="flex items-center justify-between">
    <h2 class="text-lg font-semibold">Courses</h2>
    <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
      + New Course
    </button>
  </div>

  @for (course of courses; track course.id) {
    <div class="bg-white rounded-lg shadow p-6">
      <div class="flex items-center justify-between">
        <div>
          <h3 class="text-lg font-medium">{{ course.name }}</h3>
          <p class="text-sm text-gray-500">{{ course.chapterCount }} chapters</p>
        </div>
        <div class="w-32">
          <div class="flex justify-between text-xs text-gray-500 mb-1">
            <span>Readiness</span>
            <span>{{ course.progress * 100 | number:'1.0-0' }}%</span>
          </div>
          <div class="bg-gray-200 rounded-full h-2">
            <div class="bg-blue-600 h-2 rounded-full transition-all"
                 [style.width.%]="course.progress * 100"></div>
          </div>
        </div>
      </div>
    </div>
  }
  @empty {
    <div class="bg-white rounded-lg shadow p-12 text-center">
      <p class="text-gray-500">No courses yet. Create one to get started!</p>
    </div>
  }
</div>
