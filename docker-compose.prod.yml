services:
  postgres:
    image: postgres:16-alpine
    container_name: smartstudy-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartstudy
      POSTGRES_USER: smartstudy
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartstudy}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartstudy"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartstudy-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/smartstudy
      DATABASE_USERNAME: smartstudy
      DATABASE_PASSWORD: ${DB_PASSWORD:-smartstudy}
      CORS_ALLOWED_ORIGINS: "*"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartstudy-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
